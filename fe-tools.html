<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worker-tools - 打工人的 tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background: #F8FAFC; }
    .tab-slider { transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card { transition: all 0.2s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15); }
    .btn-press:active { transform: scale(0.95); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .priority-high { border-left: 4px solid #EF4444; }
    .priority-medium { border-left: 4px solid #F59E0B; }
    .priority-low { border-left: 4px solid #34D399; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .cute-shadow { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1); }
    .side-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .overlay { transition: opacity 0.3s ease; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Settings Overlay -->
  <div id="settings-overlay" class="fixed inset-0 bg-black/30 z-40 overlay opacity-0 pointer-events-none" onclick="closeSettings()"></div>

  <!-- Settings Side Panel -->
  <div id="settings-panel" class="side-panel fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-50 transform translate-x-full">
    <div class="p-6 h-full flex flex-col">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">设置</h2>
        <button onclick="closeSettings()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto scrollbar-hide">
        <div class="space-y-6">
          <div>
            <h3 class="text-sm font-medium text-gray-500 mb-3">AI 设置</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">API 接口地址</label>
                <input id="settings-api-url" type="text" placeholder="https://api.minimaxi.com/anthropic/messages" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">模型名称</label>
                <input id="settings-model" type="text" placeholder="MiniMax-M2.7" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">API Key</label>
                <input id="settings-api-key" type="password" placeholder="输入 API Key" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-sm">
              </div>
            </div>
          </div>

          <button onclick="saveSettings()" class="btn-press w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-medium hover:shadow-lg transition-shadow">
            保存设置
          </button>

          <p id="settings-status" class="text-sm text-center"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="flex items-center justify-between mb-8">
      <div class="inline-flex items-center gap-3 bg-white rounded-2xl px-6 py-4 cute-shadow">
        <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
          </svg>
        </div>
        <div class="text-left">
          <h1 class="text-2xl font-bold text-gray-800">worker-tools</h1>
          <p class="text-sm text-gray-500">打工人的 tools</p>
        </div>
      </div>
      <button onclick="openSettings()" class="btn-press w-12 h-12 bg-white rounded-2xl cute-shadow hover:shadow-lg transition-shadow flex items-center justify-center group">
        <svg class="w-5 h-5 text-gray-500 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </header>

    <!-- Tab Navigation -->
    <div class="bg-white rounded-2xl cute-shadow mb-6 p-2 relative">
      <div class="relative flex">
        <div id="tab-slider" class="tab-slider absolute top-0 bottom-0 w-1/3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl"></div>
        <button onclick="switchTab(0)" class="tab-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-700 z-10 transition-colors" data-tab="todo">
          <span class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            待办
          </span>
        </button>
        <button onclick="switchTab(1)" class="tab-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-700 z-10 transition-colors" data-tab="clipboard">
          <span class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            剪贴板
          </span>
        </button>
        <button onclick="switchTab(2)" class="tab-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-700 z-10 transition-colors" data-tab="qrcode">
          <span class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
            二维码
          </span>
        </button>
      </div>
    </div>

    <!-- Content Panels -->
    <div id="panels">
      <!-- Todo Panel -->
      <div id="panel-todo" class="panel fade-in">
        <div class="bg-white rounded-2xl cute-shadow p-6 mb-4">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">添加任务</h2>
          <div class="flex gap-3">
            <input id="todo-input" type="text" placeholder="输入新任务..." class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all" onkeypress="if(event.key==='Enter')addTodo()">
            <select id="todo-priority" class="px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none">
              <option value="low">低优先级</option>
              <option value="medium" selected>中优先级</option>
              <option value="high">高优先级</option>
            </select>
            <button onclick="addTodo()" class="btn-press px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-medium hover:shadow-lg transition-shadow">添加</button>
          </div>
        </div>

        <div id="ai-settings-hint" class="bg-amber-50 rounded-2xl cute-shadow p-6 mb-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div class="flex-1">
              <p class="text-sm font-medium text-amber-800">AI 功能需要配置</p>
              <p class="text-xs text-amber-600 mt-0.5">点击右上角设置按钮配置 API Key</p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl cute-shadow p-6 mb-4">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">任务列表</h2>
            <span id="todo-count" class="text-sm text-gray-400">0 项任务</span>
          </div>
          <div id="todo-list" class="space-y-2 max-h-80 overflow-y-auto scrollbar-hide">
            <div class="text-center py-8 text-gray-400">
              <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
              <p>暂无任务</p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl cute-shadow p-6">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">生成日报</h2>
          <button onclick="generateReport()" class="btn-press w-full py-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-xl font-medium hover:shadow-lg transition-shadow flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/></svg>
            基于已完成任务生成日报
          </button>
          <div id="report-output" class="mt-4 hidden">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-gray-700">生成结果</span>
              <button onclick="copyReport()" class="text-sm text-indigo-500 hover:text-indigo-600">复制</button>
            </div>
            <div id="report-content" class="p-4 bg-gray-50 rounded-xl text-sm text-gray-700 max-h-96 overflow-y-auto prose prose-sm max-w-none"></div>
          </div>
        </div>
      </div>

      <!-- Clipboard Panel -->
      <div id="panel-clipboard" class="panel hidden fade-in">
        <div class="bg-white rounded-2xl cute-shadow p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">剪贴板历史</h2>
            <button onclick="clearClipboard()" class="btn-press text-sm text-gray-500 hover:text-red-500 transition-colors">清空全部</button>
          </div>
          <div id="clipboard-list" class="space-y-2 max-h-96 overflow-y-auto scrollbar-hide">
            <div class="text-center py-8 text-gray-400">
              <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
              <p>暂无剪贴板记录</p>
              <p class="text-xs mt-1">复制内容后会自动记录</p>
            </div>
          </div>
        </div>
      </div>

      <!-- QRCode Panel -->
      <div id="panel-qrcode" class="panel hidden fade-in">
        <div class="bg-white rounded-2xl cute-shadow p-6 mb-4">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">输入内容</h2>
          <div class="flex gap-3">
            <input id="qr-input" type="text" placeholder="输入 URL 或文本..." class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all" oninput="generateQR()">
            <select id="qr-size" class="px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none" onchange="generateQR()">
              <option value="150">150px</option>
              <option value="200" selected>200px</option>
              <option value="250">250px</option>
              <option value="300">300px</option>
            </select>
          </div>
        </div>

        <div class="bg-white rounded-2xl cute-shadow p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">二维码</h2>
            <button onclick="downloadQR()" class="btn-press px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-lg text-sm font-medium hover:shadow-lg transition-shadow flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              下载
            </button>
          </div>
          <div class="flex items-center justify-center min-h-[250px] bg-gray-50 rounded-xl">
            <div id="qr-placeholder" class="text-center text-gray-400">
              <svg class="w-16 h-16 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
              <p>输入内容生成二维码</p>
            </div>
            <div id="qr-container" class="hidden flex items-center justify-center"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-8 text-sm text-gray-400">
      <p>worker-tools v1.0 · 数据存储在本地 IndexDB</p>
    </footer>
  </div>

  <script>
    // ==================== Database Setup ====================
    const db = new Dexie('FeToolsDB');
    db.version(1).stores({
      clipboard: '++id, content, timestamp',
      todos: '++id, text, completed, priority, createdAt'
    });

    // ==================== Settings Panel ====================
    function openSettings() {
      const panel = document.getElementById('settings-panel');
      const overlay = document.getElementById('settings-overlay');
      panel.classList.remove('translate-x-full');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      loadSettings();
    }

    function closeSettings() {
      const panel = document.getElementById('settings-panel');
      const overlay = document.getElementById('settings-overlay');
      panel.classList.add('translate-x-full');
      overlay.classList.add('opacity-0', 'pointer-events-none');
    }

    function loadSettings() {
      document.getElementById('settings-api-url').value = localStorage.getItem('fe-tools-api-url') || '';
      document.getElementById('settings-model').value = localStorage.getItem('fe-tools-model') || '';
      document.getElementById('settings-api-key').value = localStorage.getItem('fe-tools-api-key') || '';
    }

    function saveSettings() {
      const apiUrl = document.getElementById('settings-api-url').value.trim();
      const model = document.getElementById('settings-model').value.trim();
      const apiKey = document.getElementById('settings-api-key').value.trim();

      if (apiUrl) localStorage.setItem('fe-tools-api-url', apiUrl);
      else localStorage.removeItem('fe-tools-api-url');

      if (model) localStorage.setItem('fe-tools-model', model);
      else localStorage.removeItem('fe-tools-model');

      if (apiKey) localStorage.setItem('fe-tools-api-key', apiKey);
      else localStorage.removeItem('fe-tools-api-key');

      const status = document.getElementById('settings-status');
      status.textContent = '✓ 设置已保存';
      status.className = 'text-sm text-center text-emerald-500';

      setTimeout(() => {
        status.textContent = '';
      }, 2000);
    }

    function hasAiConfig() {
      return localStorage.getItem('fe-tools-api-key') && localStorage.getItem('fe-tools-api-url');
    }

    // ==================== Tab Navigation ====================
    let currentTab = 0;
    const tabBtns = document.querySelectorAll('.tab-btn');

    function switchTab(index) {
      currentTab = index;
      const slider = document.getElementById('tab-slider');
      slider.style.left = `${index * 33.333}%`;

      document.querySelectorAll('.panel').forEach((p, i) => {
        p.classList.toggle('hidden', i !== index);
      });

      tabBtns.forEach((btn, i) => {
        btn.classList.toggle('text-white', i === index);
        btn.classList.toggle('text-gray-500', i !== index);
      });

      updateAiHint();
    }

    function updateAiHint() {
      const hint = document.getElementById('ai-settings-hint');
      if (hint) {
        hint.classList.toggle('hidden', hasAiConfig());
      }
    }

    // ==================== Clipboard Manager ====================
    const MAX_CLIPBOARD_ITEMS = 100;
    let lastClipboardContent = '';

    async function loadClipboard() {
      const items = await db.clipboard.orderBy('timestamp').reverse().limit(MAX_CLIPBOARD_ITEMS).toArray();
      const list = document.getElementById('clipboard-list');

      if (items.length === 0) {
        list.innerHTML = `
          <div class="text-center py-8 text-gray-400">
            <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <p>暂无剪贴板记录</p>
            <p class="text-xs mt-1">复制内容后会自动记录</p>
          </div>`;
        return;
      }

      list.innerHTML = items.map(item => `
        <div class="fade-in flex items-start gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors group">
          <div class="flex-1 min-w-0">
            <p class="text-sm text-gray-700 break-all line-clamp-3">${escapeHtml(item.content)}</p>
            <p class="text-xs text-gray-400 mt-1">${formatTime(item.timestamp)}</p>
          </div>
          <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="copyToClipboard('${escapeHtml(item.content).replace(/'/g, "\\'")}')" class="btn-press p-2 text-indigo-500 hover:bg-indigo-50 rounded-lg" title="复制">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            </button>
            <button onclick="deleteClipboardItem(${item.id})" class="btn-press p-2 text-red-400 hover:bg-red-50 rounded-lg" title="删除">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    async function addClipboardItem(content) {
      if (!content || content.trim() === '') return;
      if (content === lastClipboardContent) return;
      lastClipboardContent = content;

      const existing = await db.clipboard.where('content').equals(content).first();
      if (existing) {
        await db.clipboard.update(existing.id, { timestamp: Date.now() });
      } else {
        await db.clipboard.add({ content: content.trim(), timestamp: Date.now() });
        const count = await db.clipboard.count();
        if (count > MAX_CLIPBOARD_ITEMS) {
          const oldest = await db.clipboard.orderBy('timestamp').first();
          if (oldest) await db.clipboard.delete(oldest.id);
        }
      }
      loadClipboard();
    }

    async function deleteClipboardItem(id) {
      await db.clipboard.delete(id);
      loadClipboard();
    }

    async function clearClipboard() {
      await db.clipboard.clear();
      loadClipboard();
    }

    function copyToClipboard(content) {
      navigator.clipboard.writeText(content).then(() => {
        lastClipboardContent = content;
        showToast('已复制到剪贴板');
      });
    }

    // Clipboard listener using paste event
    document.addEventListener('paste', (e) => {
      const text = e.clipboardData?.getData('text');
      if (text) addClipboardItem(text);
    });

    // ==================== Todo List ====================
    async function loadTodos() {
      const todos = await db.todos.orderBy('createdAt').reverse().toArray();
      const list = document.getElementById('todo-list');
      const count = document.getElementById('todo-count');

      count.textContent = `${todos.length} 项任务`;

      if (todos.length === 0) {
        list.innerHTML = `
          <div class="text-center py-8 text-gray-400">
            <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            <p>暂无任务</p>
          </div>`;
        return;
      }

      const priorityColors = {
        high: 'priority-high',
        medium: 'priority-medium',
        low: 'priority-low'
      };

      list.innerHTML = todos.map(todo => `
        <div class="fade-in flex items-center gap-3 p-3 bg-gray-50 rounded-xl ${priorityColors[todo.priority]} group">
          <button onclick="toggleTodo(${todo.id})" class="btn-press w-6 h-6 rounded-full border-2 ${todo.completed ? 'bg-emerald-500 border-emerald-500' : 'border-gray-300 hover:border-indigo-400'} flex items-center justify-center transition-colors">
            ${todo.completed ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' : ''}
          </button>
          <span class="flex-1 text-sm ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'}">${escapeHtml(todo.text)}</span>
          <button onclick="deleteTodo(${todo.id})" class="btn-press p-2 text-red-400 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity" title="删除">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      `).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const priority = document.getElementById('todo-priority');
      const text = input.value.trim();

      if (!text) return;

      await db.todos.add({
        text,
        priority: priority.value,
        completed: false,
        createdAt: Date.now()
      });

      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      const todo = await db.todos.get(id);
      await db.todos.update(id, { completed: !todo.completed });
      loadTodos();
    }

    async function deleteTodo(id) {
      await db.todos.delete(id);
      loadTodos();
    }

    // ==================== AI Report Generation ====================
    async function generateReport() {
      const apiUrl = localStorage.getItem('fe-tools-api-url');
      const model = localStorage.getItem('fe-tools-model');
      const apiKey = localStorage.getItem('fe-tools-api-key');

      if (!apiUrl || !model || !apiKey) {
        showToast('请先在设置中配置完整信息', 'error');
        openSettings();
        return;
      }

      const todos = await db.todos.toArray();
      const completedTodos = todos.filter(t => t.completed);
      const pendingTodos = todos.filter(t => !t.completed);

      if (completedTodos.length === 0) {
        showToast('暂无已完成的任务', 'error');
        return;
      }

      const reportOutput = document.getElementById('report-output');
      const reportContent = document.getElementById('report-content');
      reportOutput.classList.remove('hidden');
      reportContent.innerHTML = '<div class="text-center py-4"><div class="inline-block w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><p class="mt-2 text-gray-500">正在生成...</p></div>';

      const completedList = completedTodos.map(t => `- ${t.text} [${getPriorityLabel(t.priority)}]`).join('\n');
      const pendingList = pendingTodos.length > 0 ? pendingTodos.map(t => `- ${t.text} [${getPriorityLabel(t.priority)}]`).join('\n') : '无';

      const prompt = `根据以下任务数据，用一句话生成今日日报。自动按优先级（高→中→低）聚合描述已完成的任务，突出重点。

已完成任务：
${completedList}

待处理任务：
${pendingList}

要求：
- 用一句话总结今日工作成果
- 按优先级从高到低描述
- 不要添加任何未提供的信息
- 不要使用表格或列表，用流畅的句子描述`;

      try {
        const response = await fetch('http://localhost:3000', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            apiUrl: apiUrl,
            model: model,
            apiKey: apiKey,
            prompt: prompt,
            max_tokens: 1024
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error?.message || `API 请求失败 (${response.status})`);
        }

        const data = await response.json();
        // MiniMax 返回格式：content 是数组，找到 type="text" 的项
        const textItem = data.content.find(item => item.type === 'text');
        const content = textItem ? textItem.text : JSON.stringify(data);
        reportContent.innerHTML = marked.parse(content);
      } catch (error) {
        reportContent.innerHTML = `<div class="text-red-500">生成失败: ${error.message}</div>`;
      }
    }

    function getPriorityLabel(priority) {
      const labels = { high: '高优先级', medium: '中优先级', low: '低优先级' };
      return labels[priority] || priority;
    }

    function copyReport() {
      const content = document.getElementById('report-content').innerText;
      navigator.clipboard.writeText(content).then(() => {
        showToast('报告已复制到剪贴板');
      });
    }

    // ==================== QR Code ====================
    let qrDataUrl = '';
    let currentQR = null;

    function generateQR() {
      const input = document.getElementById('qr-input').value;
      const size = parseInt(document.getElementById('qr-size').value);
      const qrContainer = document.getElementById('qr-container');
      const placeholder = document.getElementById('qr-placeholder');

      if (!input) {
        qrContainer.innerHTML = '';
        qrContainer.classList.add('hidden');
        placeholder.classList.remove('hidden');
        qrDataUrl = '';
        return;
      }

      placeholder.classList.add('hidden');
      qrContainer.classList.remove('hidden');
      qrContainer.innerHTML = '';

      currentQR = new QRCode(qrContainer, {
        text: input,
        width: size,
        height: size,
        colorDark: '#4F46E5',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M
      });

      setTimeout(() => {
        const img = qrContainer.querySelector('img');
        if (img) {
          qrDataUrl = img.src;
        } else {
          const canvas = qrContainer.querySelector('canvas');
          if (canvas) {
            qrDataUrl = canvas.toDataURL('image/png');
          }
        }
      }, 100);
    }

    function downloadQR() {
      if (!qrDataUrl) {
        showToast('请先生成二维码', 'error');
        return;
      }

      const link = document.createElement('a');
      link.download = 'worker-tools-qrcode.png';
      link.href = qrDataUrl;
      link.click();
      showToast('二维码已下载');
    }

    // ==================== Utilities ====================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;

      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;

      return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl text-white text-sm font-medium z-50 ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'} shadow-lg fade-in`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ==================== Initialize ====================
    document.addEventListener('DOMContentLoaded', () => {
      switchTab(0);
      loadClipboard();
      loadTodos();
      updateAiHint();
    });
  </script>
